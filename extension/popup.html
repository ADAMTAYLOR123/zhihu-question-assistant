<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知乎提问助手设置</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">ZH QUESTION LAB</p>
        <h1>模型设置</h1>
        <p class="subtitle">网页右下角的悬浮球是主要入口，本页面只用于配置模型。</p>
      </header>

      <div class="settings-panel settings-panel-static">
        <div class="settings-content">
          <p class="settings-intro">留空时使用后端 <code>.env</code> 中的默认配置；自定义 URL 和 Key 需要同时填写。</p>

          <label class="field">
            <span>模型提供方</span>
            <select id="providerInput">
              <option value="">使用后端默认设置</option>
              <option value="openai">OpenAI-compatible API</option>
              <option value="codex-cli">本机 Codex CLI</option>
            </select>
          </label>

          <label class="field api-config-field">
            <span>API Base URL</span>
            <input id="baseUrlInput" type="url" placeholder="https://api.openai.com/v1" autocomplete="url" />
          </label>

          <label class="field api-config-field">
            <span>API Key</span>
            <input id="apiKeyInput" type="password" placeholder="sk-..." autocomplete="off" />
          </label>

          <label class="field">
            <span>Model Name</span>
            <input id="modelInput" type="text" placeholder="gpt-4o-mini" autocomplete="off" />
            <small id="modelHint" class="field-hint">API 模式下留空时使用后端模型配置。</small>
          </label>

          <p id="apiSecurityNotice" class="security-notice">
            Key 只保存在当前浏览器会话中，完全退出 Chrome 后需重新填写。
          </p>
          <p id="codexNotice" class="security-notice codex-notice is-hidden">
            Codex CLI 模式复用本机登录态，不需要 API Key。首次使用前请运行 <code>codex login</code>。
          </p>

          <div class="settings-actions">
            <button id="saveSettingsButton" class="secondary-button" type="button">保存设置</button>
            <button id="clearSettingsButton" class="text-button" type="button">清空设置</button>
          </div>
          <p id="settingsStatus" class="settings-status" aria-live="polite"></p>
        </div>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
